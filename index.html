<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Mi Casa"/>
  <meta name="theme-color" content="#C0580A"/>
  <title>Mi Casa — Gastos</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;}
    body{background:#FDF6EE;font-family:'Plus Jakarta Sans',sans-serif;color:#3D2B1F;-webkit-tap-highlight-color:transparent;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:#F5EDE3;}
    ::-webkit-scrollbar-thumb{background:#D4A574;border-radius:3px;}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.4) sepia(1) saturate(3) hue-rotate(340deg);cursor:pointer;}
    select option{background:#FDF6EE;color:#3D2B1F;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeLeft{from{opacity:0;transform:translateX(18px);}to{opacity:1;transform:translateX(0);}}
    @keyframes fadeRight{from{opacity:0;transform:translateX(-18px);}to{opacity:1;transform:translateX(0);}}
    @keyframes popIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
    .fade-up{animation:fadeUp .3s ease both;}
    .fade-left{animation:fadeLeft .25s ease both;}
    .fade-right{animation:fadeRight .25s ease both;}
    .pop-in{animation:popIn .28s cubic-bezier(.34,1.56,.64,1) both;}
    .card-hover{transition:box-shadow .2s,transform .15s;}
    .card-hover:hover{box-shadow:0 6px 24px rgba(180,100,50,.14)!important;transform:translateY(-1px);}
    .kpi-hover{transition:transform .2s,box-shadow .2s;}
    .kpi-hover:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(180,100,50,.16)!important;}
    .btn-mes{transition:all .15s;}
    .btn-mes:active{transform:scale(.92);}
    input,select,textarea{font-family:'Plus Jakarta Sans',sans-serif;}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const CATEGORIAS = [
  { id:"hipoteca",       label:"Hipoteca / Alquiler", icon:"🏠", color:"#E8714A", bg:"#FEF0EB" },
  { id:"comunidad",      label:"Comunidad",           icon:"🏢", color:"#D4850A", bg:"#FEF5E4" },
  { id:"ibi",            label:"IBI",                 icon:"🏛️", color:"#7C6FCF", bg:"#F0EEFF" },
  { id:"seguros",        label:"Seguros",             icon:"🛡️", color:"#2E9E6B", bg:"#E8F8F1" },
  { id:"suministros",    label:"Suministros",         icon:"⚡", color:"#C0820A", bg:"#FFF8E6" },
  { id:"extraordinario", label:"Extraordinario",      icon:"🔧", color:"#D45C5C", bg:"#FFF0F0" },
  { id:"suscripciones",  label:"Suscripciones",       icon:"📱", color:"#2A8FB0", bg:"#E8F6FB" },
  { id:"otro",           label:"Otro",                icon:"📋", color:"#7A8A99", bg:"#F2F5F8" },
];
const PERIODICIDADES = [
  { id:"puntual",    label:"Puntual",    icon:"1️⃣" },
  { id:"mensual",    label:"Mensual",    icon:"📅" },
  { id:"bimestral",  label:"Bimestral",  icon:"📆" },
  { id:"trimestral", label:"Trimestral", icon:"🗓️" },
  { id:"semestral",  label:"Semestral",  icon:"📊" },
  { id:"anual",      label:"Anual",      icon:"🎯" },
];
const MESES       = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MESES_CORTO = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const defaultGasto = { nombre:"", categoria:"comunidad", importe:"", vencimiento:"", periodicidad:"mensual", pagado:false, notas:"" };
const SEL = { background:"#fff", border:"1px solid #DFC5A8", color:"#3D2B1F", padding:"8px 12px", borderRadius:9, fontSize:13, cursor:"pointer", outline:"none", fontFamily:"inherit" };
const INP = { background:"#fff", border:"1.5px solid #DFC5A8", color:"#3D2B1F", padding:"10px 14px", borderRadius:10, fontSize:14, outline:"none", fontFamily:"inherit", width:"100%" };

function load(k,f){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):f; }catch{ return f; } }
function diasHasta(f){ if(!f)return null; const h=new Date();h.setHours(0,0,0,0); const d=new Date(f+"T00:00:00");d.setHours(0,0,0,0); return Math.round((d-h)/86400000); }
function eur(n){ return Number(n||0).toLocaleString("es-ES",{style:"currency",currency:"EUR"}); }
function fdate(f){ if(!f)return"—"; const d=new Date(f+"T00:00:00"); return `${d.getDate()} ${MESES_CORTO[d.getMonth()]} ${d.getFullYear()}`; }

function Chip({dias}){
  if(dias===null)return null;
  const s=(c,b)=>({background:b,color:c,border:`1px solid ${c}30`,borderRadius:20,padding:"3px 9px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"});
  if(dias<0)  return <span style={s("#D45C5C","#FFF0F0")}>⚠ Vencido</span>;
  if(dias===0)return <span style={s("#E8714A","#FEF0EB")}>🔥 Hoy</span>;
  if(dias<=3) return <span style={s("#E8714A","#FEF0EB")}>🕐 {dias}d</span>;
  if(dias<=7) return <span style={s("#C0820A","#FFF8E6")}>⏰ {dias}d</span>;
  if(dias<=30)return <span style={s("#7C6FCF","#F0EEFF")}>📅 {dias}d</span>;
  return null;
}

function App(){
  const [gastos,      setGastos]      = useState(()=>load("mi_casa_gastos",[]));
  const [vista,       setVista]       = useState("dashboard");
  const [modal,       setModal]       = useState(false);
  const [editando,    setEditando]    = useState(null);
  const [form,        setForm]        = useState(defaultGasto);
  const [dashMes,     setDashMes]     = useState(new Date().getMonth());
  const [dashAnio,    setDashAnio]    = useState(new Date().getFullYear());
  const [filtroMes,   setFiltroMes]   = useState(new Date().getMonth());
  const [filtroAnio,  setFiltroAnio]  = useState(new Date().getFullYear());
  const [filtroCat,   setFiltroCat]   = useState("todas");
  const [notif,       setNotif]       = useState(typeof Notification!=="undefined"?Notification.permission:"denied");
  const [toast,       setToast]       = useState(null);
  const [dir,         setDir]         = useState("left"); // animación dirección

  useEffect(()=>{ localStorage.setItem("mi_casa_gastos",JSON.stringify(gastos)); },[gastos]);
  const showToast = useCallback((msg,tipo="ok")=>{ setToast({msg,tipo}); setTimeout(()=>setToast(null),3000); },[]);

  const pedirNotif = async()=>{
    if(typeof Notification==="undefined")return;
    const p=await Notification.requestPermission();
    setNotif(p); if(p==="granted")showToast("🔔 Notificaciones activadas");
  };

  useEffect(()=>{
    if(notif!=="granted")return;
    gastos.forEach(g=>{
      if(g.pagado||!g.vencimiento)return;
      const d=diasHasta(g.vencimiento);
      if(d===7)new Notification(`📅 ${g.nombre}`,{body:`Vence en 7 días — ${eur(g.importe)}`});
      if(d===1)new Notification(`⚠️ ${g.nombre}`,{body:`¡Vence mañana! — ${eur(g.importe)}`});
      if(d===0)new Notification(`🔴 ${g.nombre}`,{body:`¡Vence HOY! — ${eur(g.importe)}`});
    });
  },[gastos,notif]);

  // Navegación mes dashboard
  function mesSig(){
    setDir("left");
    if(dashMes===11){ setDashMes(0); setDashAnio(a=>a+1); }
    else setDashMes(m=>m+1);
  }
  function mesAnt(){
    setDir("right");
    if(dashMes===0){ setDashMes(11); setDashAnio(a=>a-1); }
    else setDashMes(m=>m-1);
  }
  function irHoy(){
    setDir("left");
    setDashMes(new Date().getMonth());
    setDashAnio(new Date().getFullYear());
  }

  function abrirModal(g=null){
    if(g){setEditando(g.id);setForm({...g});}
    else{setEditando(null);setForm({...defaultGasto,vencimiento:new Date().toISOString().split("T")[0]});}
    setModal(true);
  }
  function guardar(){
    if(!form.nombre.trim()||!form.importe){showToast("⚠️ Completa nombre e importe","err");return;}
    if(editando){setGastos(p=>p.map(g=>g.id===editando?{...form,id:editando}:g));showToast("✅ Actualizado");}
    else{setGastos(p=>[...p,{...form,id:Date.now().toString(),pagado:false}]);showToast("✅ Añadido");}
    setModal(false);
  }
  function toggle(id){setGastos(p=>p.map(g=>g.id===id?{...g,pagado:!g.pagado}:g));}
  function del(id){ if(!confirm("¿Eliminar?"))return; setGastos(p=>p.filter(g=>g.id!==id)); showToast("🗑️ Eliminado"); }
  function csv(){
    const h="Nombre,Categoría,Importe,Vencimiento,Periodicidad,Estado,Notas";
    const r=gastos.map(g=>`"${g.nombre}","${CATEGORIAS.find(c=>c.id===g.categoria)?.label}",${g.importe},"${g.vencimiento}","${g.periodicidad}","${g.pagado?"Pagado":"Pendiente"}","${g.notas}"`);
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([h+"\n"+r.join("\n")],{type:"text/csv;charset=utf-8;"}));
    a.download="gastos_hogar.csv";a.click();
  }

  const mesActReal  = new Date().getMonth();
  const anioActReal = new Date().getFullYear();
  const esMesActual = dashMes===mesActReal && dashAnio===anioActReal;

  // Gastos del mes seleccionado en dashboard
  const gDashMes = gastos.filter(g=>{
    if(!g.vencimiento)return false;
    const d=new Date(g.vencimiento+"T00:00:00");
    return d.getMonth()===dashMes && d.getFullYear()===dashAnio;
  });
  const dPagado   = gDashMes.filter(g=>g.pagado).reduce((s,g)=>s+Number(g.importe),0);
  const dPendiente= gDashMes.filter(g=>!g.pagado).reduce((s,g)=>s+Number(g.importe),0);
  const dTotal    = dPagado+dPendiente;
  const dPct      = dTotal>0?Math.round((dPagado/dTotal)*100):0;

  // Gastos que vencen este mes y no están pagados
  const dVencenMes = gDashMes.filter(g=>!g.pagado).sort((a,b)=>new Date(a.vencimiento)-new Date(b.vencimiento));
  // Gastos vencidos (de cualquier mes anterior, sin pagar)
  const vencidos = gastos.filter(g=>{
    if(g.pagado||!g.vencimiento)return false;
    const d=new Date(g.vencimiento+"T00:00:00"); d.setHours(0,0,0,0);
    const h=new Date(); h.setHours(0,0,0,0);
    return d<h;
  });

  const totAnual = gastos.filter(g=>g.vencimiento&&new Date(g.vencimiento+"T00:00:00").getFullYear()===dashAnio).reduce((s,g)=>s+Number(g.importe),0);
  const porCat   = CATEGORIAS.map(c=>({...c,
    total:gDashMes.filter(g=>g.categoria===c.id).reduce((s,g)=>s+Number(g.importe),0),
    count:gDashMes.filter(g=>g.categoria===c.id).length
  })).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // Gastos vista "Gastos"
  const gFilt=gastos.filter(g=>{
    const ok=filtroCat==="todas"||g.categoria===filtroCat;
    if(!g.vencimiento)return ok;
    const d=new Date(g.vencimiento+"T00:00:00");
    return ok&&d.getMonth()===filtroMes&&d.getFullYear()===filtroAnio;
  }).sort((a,b)=>(diasHasta(a.vencimiento)??999)-(diasHasta(b.vencimiento)??999));

  return (
    <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",background:"#FDF6EE",minHeight:"100vh",color:"#3D2B1F"}}>

      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:9999,background:toast.tipo==="err"?"#D45C5C":"#2E9E6B",color:"#fff",padding:"12px 20px",borderRadius:12,fontWeight:600,fontSize:14,boxShadow:"0 6px 24px rgba(0,0,0,.2)",animation:"popIn .28s ease"}}>{toast.msg}</div>}

      {/* Header */}
      <header style={{background:"linear-gradient(135deg,#7C3A1E,#C0580A 55%,#E8714A)",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(120,40,10,.25)"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"0 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",height:62}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:40,height:40,borderRadius:12,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🏡</div>
              <div>
                <h1 style={{fontFamily:"Lora",fontSize:18,fontWeight:700,color:"#fff"}}>Mi Casa</h1>
                <p style={{fontSize:10,color:"rgba(255,255,255,.65)",letterSpacing:1,textTransform:"uppercase"}}>Gestión de gastos</p>
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {notif!=="granted"&&<button onClick={pedirNotif} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",padding:"7px 12px",borderRadius:9,cursor:"pointer",fontSize:12}}>🔔</button>}
              <button onClick={()=>abrirModal()} style={{background:"#fff",border:"none",color:"#C0580A",padding:"8px 16px",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>＋ Nuevo</button>
            </div>
          </div>
          <div style={{display:"flex",gap:2}}>
            {[["dashboard","📊","Inicio"],["gastos","💳","Gastos"],["historial","📅","Historial"]].map(([v,ic,lb])=>(
              <button key={v} onClick={()=>setVista(v)} style={{background:vista===v?"rgba(255,255,255,.95)":"transparent",border:"none",color:vista===v?"#C0580A":"rgba(255,255,255,.8)",padding:"10px 14px",cursor:"pointer",fontSize:13,fontWeight:vista===v?700:500,borderRadius:"8px 8px 0 0",display:"flex",alignItems:"center",gap:5}}>{ic} {lb}</button>
            ))}
          </div>
        </div>
      </header>

      <main style={{maxWidth:960,margin:"0 auto",padding:"20px 16px",paddingBottom:50}}>

        {/* ═══ DASHBOARD ═══ */}
        {vista==="dashboard"&&(
          <div className="fade-up">

            {/* ── Alertas vencidos (siempre visibles) ── */}
            {vencidos.length>0&&(
              <div style={{background:"linear-gradient(135deg,#FFF0EB,#FDE8E0)",border:"1px solid #F5C4B0",borderLeft:"4px solid #D45C5C",borderRadius:14,padding:"14px 16px",marginBottom:18}}>
                <p style={{fontWeight:700,color:"#C0300A",marginBottom:8,fontSize:13}}>🔴 Gastos vencidos sin pagar</p>
                {vencidos.map(g=>(
                  <div key={g.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",fontSize:13,color:"#7A2010",flexWrap:"wrap",borderBottom:"1px solid #F5C4B020"}}>
                    <span style={{fontSize:16}}>{CATEGORIAS.find(c=>c.id===g.categoria)?.icon}</span>
                    <span style={{flex:1}}><strong>{g.nombre}</strong> — {fdate(g.vencimiento)}</span>
                    <span style={{fontWeight:700,color:"#D45C5C"}}>{eur(g.importe)}</span>
                    <button onClick={()=>toggle(g.id)} style={{background:"#E8714A",border:"none",color:"#fff",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700}}>✓ Pagar</button>
                  </div>
                ))}
              </div>
            )}

            {/* ── Navegador de mes ── */}
            <div style={{background:"#fff",border:"1px solid #EFE0D0",borderRadius:16,padding:"16px 18px",marginBottom:16,boxShadow:"0 2px 12px rgba(180,100,50,.08)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                {/* Botón anterior */}
                <button className="btn-mes" onClick={mesAnt} style={{width:38,height:38,borderRadius:10,background:"#F5EDE3",border:"1px solid #DFC5A8",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",color:"#8A5A35"}}>‹</button>

                {/* Mes actual */}
                <div style={{textAlign:"center",flex:1}}>
                  <p style={{fontFamily:"Lora",fontSize:20,fontWeight:700,color:"#3D2B1F"}}>{MESES[dashMes]}</p>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    <p style={{fontSize:13,color:"#A07850",fontWeight:500}}>{dashAnio}</p>
                    {esMesActual
                      ? <span style={{background:"#E8F5EE",color:"#2E9E6B",borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700,border:"1px solid #B8E0CC"}}>● Mes actual</span>
                      : <button onClick={irHoy} style={{background:"#F5EDE3",border:"1px solid #DFC5A8",color:"#8A5A35",borderRadius:20,padding:"1px 10px",fontSize:10,fontWeight:600,cursor:"pointer"}}>Ir a hoy</button>
                    }
                  </div>
                </div>

                {/* Botón siguiente */}
                <button className="btn-mes" onClick={mesSig} style={{width:38,height:38,borderRadius:10,background:"#F5EDE3",border:"1px solid #DFC5A8",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",color:"#8A5A35"}}>›</button>
              </div>

              {/* Barra de progreso del mes */}
              {dTotal>0&&(
                <div style={{marginTop:12}}>
                  <div style={{background:"#F5EDE3",borderRadius:8,height:10,overflow:"hidden"}}>
                    <div style={{background:"linear-gradient(90deg,#2E9E6B,#52C98A)",width:`${dPct}%`,height:"100%",borderRadius:8,transition:"width .6s ease"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                    <p style={{fontSize:11,color:"#2E9E6B",fontWeight:600}}>✅ {dPct}% pagado</p>
                    <p style={{fontSize:11,color:"#E8714A",fontWeight:600}}>⏳ {100-dPct}% pendiente</p>
                  </div>
                </div>
              )}
            </div>

            {/* ── KPIs del mes ── */}
            <div className={`fade-${dir}`} style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16}}>
              <div className="kpi-hover" style={{background:"linear-gradient(135deg,#F0FBF6,#E0F5EC)",border:"1px solid #B8E8D0",borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 8px rgba(46,158,107,.1)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <p style={{fontSize:10,color:"#2E7A55",textTransform:"uppercase",letterSpacing:.7,fontWeight:600}}>✅ Pagado</p>
                  <span style={{fontSize:20}}>💸</span>
                </div>
                <p style={{fontFamily:"Lora",fontSize:20,fontWeight:700,color:"#2E9E6B",marginTop:6}}>{eur(dPagado)}</p>
                <p style={{fontSize:10,color:"#2E7A55",marginTop:2}}>{gDashMes.filter(g=>g.pagado).length} gastos pagados</p>
              </div>

              <div className="kpi-hover" style={{background:"linear-gradient(135deg,#FEF5F0,#FEE8DF)",border:"1px solid #F5C4A8",borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 8px rgba(232,113,74,.1)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <p style={{fontSize:10,color:"#A04020",textTransform:"uppercase",letterSpacing:.7,fontWeight:600}}>⏳ Pendiente</p>
                  <span style={{fontSize:20}}>📋</span>
                </div>
                <p style={{fontFamily:"Lora",fontSize:20,fontWeight:700,color:"#E8714A",marginTop:6}}>{eur(dPendiente)}</p>
                <p style={{fontSize:10,color:"#A04020",marginTop:2}}>{dVencenMes.length} gastos pendientes</p>
              </div>

              <div className="kpi-hover" style={{background:"linear-gradient(135deg,#FFFBF0,#FFF4D9)",border:"1px solid #F5DFA8",borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 8px rgba(192,130,10,.1)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <p style={{fontSize:10,color:"#7A5200",textTransform:"uppercase",letterSpacing:.7,fontWeight:600}}>📊 Total mes</p>
                  <span style={{fontSize:20}}>🏷️</span>
                </div>
                <p style={{fontFamily:"Lora",fontSize:20,fontWeight:700,color:"#C0820A",marginTop:6}}>{eur(dTotal)}</p>
                <p style={{fontSize:10,color:"#7A5200",marginTop:2}}>{gDashMes.length} gastos en total</p>
              </div>

              <div className="kpi-hover" style={{background:"linear-gradient(135deg,#F5F3FF,#EDE8FF)",border:"1px solid #CCC4F5",borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 8px rgba(124,111,207,.1)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <p style={{fontSize:10,color:"#4A3A90",textTransform:"uppercase",letterSpacing:.7,fontWeight:600}}>📅 Total {dashAnio}</p>
                  <span style={{fontSize:20}}>🗓️</span>
                </div>
                <p style={{fontFamily:"Lora",fontSize:20,fontWeight:700,color:"#7C6FCF",marginTop:6}}>{eur(totAnual)}</p>
                <p style={{fontSize:10,color:"#4A3A90",marginTop:2}}>acumulado anual</p>
              </div>
            </div>

              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={()=>setModal(false)} style={{background:"#F5EDE3",border:"1px solid #DFC5A8",color:"#8A5A35",padding:"12px 20px",borderRadius:10,cursor:"pointer",fontWeight:600,flex:1}}>Cancelar</button>
              <button onClick={guardar} style={{background:"linear-gradient(135deg,#E8714A,#C0580A)",border:"none",color:"#fff",padding:"12px 20px",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:15,flex:2,boxShadow:"0 4px 14px rgba(200,80,20,.3)"}}>
                {editando?"💾 Guardar":"✅ Añadir gasto"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}
</script>

</body>
</html>
